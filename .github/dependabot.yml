version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'auto-merge'
    open-pull-requests-limit: 10
    ignore:
      # Major version bumps require manual migration — suppress individual PRs
      - dependency-name: '@clerk/nextjs'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-resizable-panels'
        update-types: ['version-update:semver-major']
      - dependency-name: 'jsdom'
        update-types: ['version-update:semver-major']
    groups:
      radix-ui:
        patterns:
          - '@radix-ui/*'
      ai-sdk:
        patterns:
          - '@ai-sdk/*'
          - 'ai'
          - 'openai'
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@testing-library/*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'auto-merge'
