name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
  # Clerk public key from secret so the SDK initialises correctly in the CI build
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Format Check
        run: npm run format:check

      - name: Unit Tests with Coverage
        run: npm run test -- --coverage --coverage.thresholds.lines=60 --coverage.thresholds.branches=50
        env:
          CRON_SECRET: test-cron-secret

      - name: Build
        run: npm run build

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E Smoke Tests
        run: npx playwright test --project=chromium
        env:
          CI: true
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_TEST_EMAIL: ${{ secrets.CLERK_TEST_EMAIL }}
          CLERK_TEST_PASSWORD: ${{ secrets.CLERK_TEST_PASSWORD }}

      - name: Upload E2E Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Security Audit (production deps)
        run: npm audit --audit-level=high --omit=dev

  mobile:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_BASE_URL: https://staging.krewpact.com
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_mobile_ci
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile

      - name: Mobile type check
        run: npm run typecheck
        working-directory: mobile

      - name: Mobile unit tests
        run: npm test
        working-directory: mobile

      - name: Expo config validation
        run: npx expo config --type public
        working-directory: mobile
