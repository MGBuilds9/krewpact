name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
  # Clerk public key from secret so the SDK initialises correctly in the CI build
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Format Check
        run: npm run format:check

      - name: Unit Tests with Coverage
        run: npm run test -- --coverage --coverage.thresholds.lines=60 --coverage.thresholds.branches=50
        env:
          CRON_SECRET: test-cron-secret

      - name: Build
        run: npm run build

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E Smoke Tests
        run: npx playwright test --project=chromium
        env:
          CI: true
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_TEST_EMAIL: ${{ secrets.CLERK_TEST_EMAIL }}
          CLERK_TEST_PASSWORD: ${{ secrets.CLERK_TEST_PASSWORD }}

      - name: Upload E2E Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Security Audit (production deps)
        run: npm audit --audit-level=high --omit=dev

  post-deploy:
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Wait for Vercel deploy
        run: |
          echo "Waiting for Vercel deployment to become ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&limit=1&target=production" \
              | jq -r '.deployments[0].readyState')
            echo "  Attempt $i: status=$STATUS"
            if [ "$STATUS" = "READY" ]; then
              echo "Deployment is ready."
              break
            fi
            sleep 10
          done
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Health check (shallow)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/api/health")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Shallow health check failed with status $STATUS"
            exit 1
          fi
        env:
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Health check (deep)
        run: |
          BODY=$(curl -s -H "Authorization: Bearer $CRON_SECRET" "$APP_URL/api/health?deep=true")
          STATUS=$(echo "$BODY" | jq -r '.status')
          echo "Deep health check: $STATUS"
          if [ "$STATUS" != "ok" ]; then
            echo "::warning::Deep health check returned: $STATUS"
            echo "$BODY" | jq .
          fi
        env:
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Create Sentry release
        run: |
          npx @sentry/cli releases new "$GITHUB_SHA"
          npx @sentry/cli releases set-commits "$GITHUB_SHA" --auto
          npx @sentry/cli releases finalize "$GITHUB_SHA"
          npx @sentry/cli releases deploys "$GITHUB_SHA" new -e production
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.x

      - name: Type-check apollo-webhook
        run: deno check supabase/functions/apollo-webhook/index.ts

      - name: Type-check framer-webhook
        run: deno check supabase/functions/framer-webhook/index.ts

  mobile:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_BASE_URL: https://staging.krewpact.com
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile

      - name: Mobile type check
        run: npm run typecheck
        working-directory: mobile

      - name: Mobile unit tests
        run: npm test
        working-directory: mobile

      - name: Expo config validation
        run: npx expo config --type public
        working-directory: mobile
